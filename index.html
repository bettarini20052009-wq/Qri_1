<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione QRI - Bigliettini Digitali</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .qri-card {
            transition: all 0.3s;
        }
        .qri-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
        }
    </style>
</head>
<body class="bg-gray-50">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <div class="w-64 bg-white border-r border-gray-200 flex flex-col">
            <div class="p-6 border-b">
                <h1 class="text-2xl font-bold text-indigo-600 flex items-center gap-2">
                    <i class="fas fa-ticket-alt"></i>
                    QRI Manager
                </h1>
                <p class="text-sm text-gray-500 mt-1">Gestione Bigliettini Digitali</p>
            </div>
            
            <div class="p-4">
                <button onclick="nuovoQRI()" 
                        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3 px-4 rounded-xl flex items-center justify-center gap-2 font-medium">
                    <i class="fas fa-plus"></i>
                    NUOVO QRI
                </button>
            </div>

            <nav class="flex-1 px-3 py-2">
                <a href="#" onclick="showSection('lista')" class="flex items-center gap-3 px-4 py-3 text-gray-700 hover:bg-gray-100 rounded-xl active">
                    <i class="fas fa-list"></i>
                    <span>Storico QRI</span>
                </a>
                <a href="#" onclick="showSection('form')" class="flex items-center gap-3 px-4 py-3 text-gray-700 hover:bg-gray-100 rounded-xl">
                    <i class="fas fa-edit"></i>
                    <span>Compila Nuovo</span>
                </a>
            </nav>

            <div class="p-4 border-t">
                <button onclick="esportaTuttiPDF()" 
                        class="w-full bg-white border border-gray-300 hover:bg-gray-50 py-2 px-4 rounded-xl text-sm flex items-center justify-center gap-2">
                    <i class="fas fa-file-pdf"></i>
                    Esporta Tutto in PDF
                </button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-1 overflow-auto">
            <!-- Header -->
            <header class="bg-white border-b px-8 py-5 flex items-center justify-between">
                <h2 id="pageTitle" class="text-2xl font-semibold text-gray-800">Storico QRI</h2>
                <div class="flex items-center gap-4">
                    <input type="text" id="searchInput" 
                           placeholder="Cerca QRI..." 
                           onkeyup="filtraQRI()"
                           class="border border-gray-300 rounded-full px-4 py-2 w-72 focus:outline-none focus:border-indigo-500">
                </div>
            </header>

            <!-- Lista Section -->
            <div id="listaSection" class="p-8">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="qriList">
                    <!-- Popolato da JS -->
                </div>
            </div>

            <!-- Form Section -->
            <div id="formSection" class="p-8 hidden">
                <div class="max-w-2xl mx-auto bg-white rounded-3xl shadow-sm border p-8">
                    <h3 class="text-xl font-semibold mb-6" id="formTitle">Nuovo QRI</h3>
                    
                    <form id="qriForm">
                        <input type="hidden" id="editId">
                        
                        <div class="grid grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Numero QRI</label>
                                <input type="text" id="numero" required
                                       class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:border-indigo-500">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Data</label>
                                <input type="date" id="data" required
                                       class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:border-indigo-500">
                            </div>
                        </div>

                        <div class="mt-6">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Titolo / Oggetto</label>
                            <input type="text" id="titolo" required
                                   class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:border-indigo-500">
                        </div>

                        <div class="mt-6">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Mittente / Richiedente</label>
                            <input type="text" id="mittente"
                                   class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:border-indigo-500">
                        </div>

                        <div class="mt-6">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Destinatario</label>
                            <input type="text" id="destinatario"
                                   class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:border-indigo-500">
                        </div>

                        <div class="mt-6">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Descrizione</label>
                            <textarea id="descrizione" rows="4"
                                      class="w-full border border-gray-300 rounded-2xl px-4 py-3 focus:outline-none focus:border-indigo-500"></textarea>
                        </div>

                        <div class="grid grid-cols-2 gap-6 mt-6">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Importo (€)</label>
                                <input type="number" step="0.01" id="importo"
                                       class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:border-indigo-500">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Stato</label>
                                <select id="stato" 
                                        class="w-full border border-gray-300 rounded-xl px-4 py-3 focus:outline-none focus:border-indigo-500">
                                    <option value="Bozza">Bozza</option>
                                    <option value="Inviato">Inviato</option>
                                    <option value="Completato">Completato</option>
                                    <option value="Annullato">Annullato</option>
                                </select>
                            </div>
                        </div>

                        <div class="flex gap-4 mt-10">
                            <button type="button" onclick="salvaQRI()"
                                    class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white py-4 rounded-2xl font-medium">
                                💾 Salva QRI
                            </button>
                            <button type="button" onclick="annullaForm()"
                                    class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 py-4 rounded-2xl font-medium">
                                Annulla
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="hidden fixed bottom-6 right-6 bg-gray-800 text-white px-6 py-3 rounded-2xl flex items-center gap-3 shadow-xl">
        <span id="toastText"></span>
    </div>

    <script>
        let qriList = JSON.parse(localStorage.getItem('qriList')) || [];

        function saveToLocalStorage() {
            localStorage.setItem('qriList', JSON.stringify(qriList));
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastText').textContent = message;
            toast.classList.remove('hidden');
            setTimeout(() => toast.classList.add('hidden'), 3000);
        }

        function renderQRIList(filteredList = qriList) {
            const container = document.getElementById('qriList');
            container.innerHTML = '';

            if (filteredList.length === 0) {
                container.innerHTML = `
                    <div class="col-span-3 text-center py-20 text-gray-400">
                        <i class="fas fa-ticket-alt text-6xl mb-4"></i>
                        <p>Nessun QRI trovato</p>
                    </div>`;
                return;
            }

            filteredList.forEach(qri => {
                const div = document.createElement('div');
                div.className = `bg-white rounded-3xl p-6 qri-card border border-gray-100`;
                div.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <span class="text-xs font-mono bg-gray-100 px-3 py-1 rounded-full">${qri.numero}</span>
                            <h4 class="font-semibold mt-3 text-lg">${qri.titolo}</h4>
                        </div>
                        <span class="text-xs px-3 py-1 rounded-full ${getStatusColor(qri.stato)}">
                            ${qri.stato}
                        </span>
                    </div>
                    <p class="text-sm text-gray-500 mt-4 line-clamp-2">${qri.descrizione || 'Nessuna descrizione'}</p>
                    
                    <div class="flex justify-between items-center mt-6 text-sm">
                        <div>
                            <span class="text-gray-400">Data:</span> ${qri.data}
                        </div>
                        ${qri.importo ? `<div class="font-medium">€
